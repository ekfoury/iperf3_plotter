# Paper-style plot templates inspired by:
# Kfoury et al., "Performance Evaluation of TCP BBRv2 Alpha for Wired
# Broadband, considering Buffer Sizes, Packet Loss Rates, RTTs, and Number
# of Flows", Computer Communications 161 (2020) 212-224.
#
# These specs are templates for research sweeps. They expect manifest columns
# such as:
#
#   cc_algo, tested_cc_algo, cc_mix, buffer_bdp, loss_percent, num_flows,
#   num_cubic_flows, num_bbrv2_flows, propagation_delay_ms, bottleneck_mbps,
#   aqm, scenario, trial
#
# Not every spec applies to every experiment. Use filters/facet_by to select
# the subset that matches your test matrix.

plots:
  # Figs. 4 and 6: CDF of per-flow throughput across buffer sizes and loss.
  - name: flow_throughput_cdf_by_buffer_and_loss
    kind: cdf
    source: flow_summary
    metric: avg_throughput_mbps
    group_by: cc_algo
    facet_by:
      - buffer_bdp
      - loss_percent
    title: Flow throughput CDF by buffer size and loss
    x_label: Average flow throughput (Mbps)
    figsize: [7.8, 5.0]
    colors:
      cubic: "#1f77b4"
      bbr: "#ff7f0e"
      bbrv1: "#ff7f0e"
      bbrv2: "#2ca02c"
    legend:
      show: true
      loc: lower right
      anchor: null
      frame: true

  # Figs. 5 and 7: CDF of bottleneck link utilization across repeated trials.
  # Use tested_cc_algo when each experiment contains many flows using the same
  # congestion-control algorithm.
  - name: link_utilization_cdf_by_buffer_and_loss
    kind: cdf
    source: experiment_summary
    metric: link_utilization_percent
    group_by: tested_cc_algo
    facet_by:
      - buffer_bdp
      - loss_percent
    title: Link utilization CDF by buffer size and loss
    x_label: Link utilization (%)
    xlim: [0, 105]
    figsize: [7.8, 5.0]
    colors:
      cubic: "#1f77b4"
      bbrv1: "#ff7f0e"
      bbrv2: "#2ca02c"

  # Fig. 8: retransmission behavior as the number of competing flows changes.
  - name: retransmits_vs_number_of_flows
    kind: line
    source: flow_summary
    x: num_flows
    y: retransmits
    group_by: cc_algo
    aggregate: mean
    marker: o
    marker_size: 5
    linewidth: 2.0
    title: Retransmissions as a function of competing flows
    x_label: Number of flows
    y_label: Retransmits
    colors:
      cubic: "#1f77b4"
      bbrv1: "#ff7f0e"
      bbrv2: "#2ca02c"

  # Fig. 9: RTT observed under different flow counts and buffer sizes.
  - name: rtt_vs_number_of_flows
    kind: line
    source: flow_summary
    x: num_flows
    y: mean_rtt_ms
    group_by: cc_algo
    facet_by: buffer_bdp
    aggregate: mean
    marker: o
    title: RTT as a function of competing flows
    x_label: Number of flows
    y_label: Mean RTT (ms)
    colors:
      cubic: "#1f77b4"
      bbrv1: "#ff7f0e"
      bbrv2: "#2ca02c"

  # Fig. 10(a,c): throughput sensitivity to random packet loss.
  - name: throughput_vs_packet_loss
    kind: line
    source: flow_summary
    x: loss_percent
    y: avg_throughput_mbps
    group_by: cc_algo
    facet_by: buffer_bdp
    aggregate: mean
    marker: o
    log_x: true
    title: Throughput as a function of packet loss
    x_label: Random packet loss (%)
    y_label: Average throughput (Mbps)
    colors:
      cubic: "#1f77b4"
      bbrv1: "#ff7f0e"
      bbrv2: "#2ca02c"

  # Fig. 10(b,d): retransmission sensitivity to random packet loss.
  - name: retransmits_vs_packet_loss
    kind: line
    source: flow_summary
    x: loss_percent
    y: retransmits
    group_by: cc_algo
    facet_by: buffer_bdp
    aggregate: mean
    marker: o
    log_x: true
    title: Retransmissions as a function of packet loss
    x_label: Random packet loss (%)
    y_label: Retransmits
    colors:
      cubic: "#1f77b4"
      bbrv1: "#ff7f0e"
      bbrv2: "#2ca02c"

  # Fig. 11: coexistence with CUBIC as buffer size changes.
  # cc_mix can be values such as cubic_vs_bbrv1 or cubic_vs_bbrv2.
  - name: coexistence_fairness_vs_buffer
    kind: line
    source: experiment_summary
    x: buffer_bdp
    y: jain_fairness
    group_by: cc_mix
    facet_by:
      - loss_percent
      - num_flows
    aggregate: mean
    marker: o
    title: Coexistence fairness as a function of buffer size
    x_label: Buffer size (BDP)
    y_label: Jain fairness
    ylim: [0, 1.05]
    palette: tab10

  - name: coexistence_cubic_share_vs_buffer
    kind: line
    source: experiment_summary
    x: buffer_bdp
    y: share_cubic_percent
    group_by: cc_mix
    facet_by:
      - loss_percent
      - num_flows
    aggregate: mean
    marker: o
    title: CUBIC bandwidth share as a function of buffer size
    x_label: Buffer size (BDP)
    y_label: CUBIC bandwidth share (%)
    ylim: [0, 100]
    palette: tab10

  # Fig. 12: bandwidth share as the mix of CUBIC and BBRv2 flows changes.
  - name: cubic_share_vs_bbrv2_flow_count
    kind: line
    source: experiment_summary
    x: num_bbrv2_flows
    y: share_cubic_percent
    group_by: loss_percent
    aggregate: mean
    marker: o
    title: CUBIC measured share vs number of BBRv2 flows
    x_label: Number of BBRv2 flows
    y_label: CUBIC bandwidth share (%)
    ylim: [0, 100]
    colors:
      "0": "#1f77b4"
      "0.01": "#2ca02c"
      "1": "#d62728"

  - name: bbrv2_share_vs_bbrv2_flow_count
    kind: line
    source: experiment_summary
    x: num_bbrv2_flows
    y: share_bbrv2_percent
    group_by: loss_percent
    aggregate: mean
    marker: o
    title: BBRv2 measured share vs number of BBRv2 flows
    x_label: Number of BBRv2 flows
    y_label: BBRv2 bandwidth share (%)
    ylim: [0, 100]
    colors:
      "0": "#1f77b4"
      "0.01": "#2ca02c"
      "1": "#d62728"

  # Fig. 13: fairness heatmap over bandwidth and propagation delay.
  - name: fairness_heatmap_bandwidth_delay_sweep
    kind: heatmap
    source: experiment_summary
    x: propagation_delay_ms
    y: bottleneck_mbps
    value: jain_fairness
    facet_by:
      - buffer_bdp
      - loss_percent
    annotations:
      - link_utilization_percent
      - share_cubic_percent
      - share_bbrv2_percent
    title: Fairness over bandwidth-delay sweep
    x_label: Propagation delay (ms)
    y_label: Bottleneck bandwidth (Mbps)
    figsize: [8.5, 6.4]
    dpi: 200
    cmap: YlGnBu
    annotation_color: black
    annotation_fontsize: 7
    x_tick_rotation: 0
    colorbar: true

  # Fig. 14: RTT unfairness. Compare flows with different configured RTTs.
  - name: rtt_unfairness_throughput_vs_buffer
    kind: line
    source: flow_summary
    x: buffer_bdp
    y: avg_throughput_mbps
    group_by: rtt_config_ms
    facet_by:
      - cc_algo
      - aqm
    aggregate: mean
    marker: o
    title: Throughput by configured RTT and buffer size
    x_label: Buffer size (BDP)
    y_label: Average throughput (Mbps)
    palette: tab10

  - name: rtt_unfairness_fairness_vs_buffer
    kind: line
    source: experiment_summary
    x: buffer_bdp
    y: jain_fairness
    group_by: aqm
    facet_by: cc_algo
    aggregate: mean
    marker: o
    title: RTT fairness as a function of buffer size
    x_label: Buffer size (BDP)
    y_label: Jain fairness
    ylim: [0, 1.05]
    palette: Set2

  # Fig. 15: retransmission behavior under Tail Drop and FQ-CoDel.
  - name: rtt_unfairness_retransmits_vs_buffer
    kind: line
    source: flow_summary
    x: buffer_bdp
    y: retransmits
    group_by: cc_algo
    facet_by: aqm
    aggregate: mean
    marker: o
    title: Retransmissions by AQM and buffer size
    x_label: Buffer size (BDP)
    y_label: Retransmits
    colors:
      bbrv1: "#ff7f0e"
      bbrv2: "#2ca02c"

  # Fig. 16: flow completion time as a function of buffer size.
  # For fixed-size iperf transfers, flow_summary.duration_s is the FCT.
  - name: fct_vs_buffer
    kind: line
    source: flow_summary
    x: buffer_bdp
    y: duration_s
    group_by: cc_algo
    facet_by: loss_percent
    aggregate: mean
    marker: o
    title: Flow completion time as a function of buffer size
    x_label: Buffer size (BDP)
    y_label: Flow completion time (s)
    colors:
      cubic: "#1f77b4"
      bbrv1: "#ff7f0e"
      bbrv2: "#2ca02c"

  # Figs. 17-20: CDF of flow completion time under coexistence and loss.
  - name: fct_cdf_by_buffer_and_loss
    kind: cdf
    source: flow_summary
    metric: duration_s
    group_by: cc_algo
    facet_by:
      - cc_mix
      - buffer_bdp
      - loss_percent
    title: Flow completion time CDF
    x_label: Flow completion time (s)
    colors:
      cubic: "#1f77b4"
      bbrv1: "#ff7f0e"
      bbrv2: "#2ca02c"

  # Fig. 21: fairness as a function of AQM policy.
  - name: aqm_fairness_vs_buffer
    kind: line
    source: experiment_summary
    x: buffer_bdp
    y: jain_fairness
    group_by: aqm
    facet_by: loss_percent
    aggregate: mean
    marker: o
    title: Fairness by AQM policy and buffer size
    x_label: Buffer size (BDP)
    y_label: Jain fairness
    ylim: [0, 1.05]
    palette: Set2
