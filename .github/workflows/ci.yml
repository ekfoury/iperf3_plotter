name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }} on Ubuntu
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Run sample analysis
        run: |
          iperfplot all sample/my_test.json --out /tmp/iperfplot-sample --format png
          test -f /tmp/iperfplot-sample/report.html
          test -f /tmp/iperfplot-sample/data/flow_intervals.csv
          test -f /tmp/iperfplot-sample/plots/throughput_flows.png
